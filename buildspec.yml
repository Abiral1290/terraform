version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform..."
      - wget -O terraform.zip https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin 362857715742.dkr.ecr.eu-west-2.amazonaws.com
      - echo "Initialising Terraform..."
      - terraform init
      - terraform validate

  build:
    commands:
      - echo "Building React app..."
      - cd website
      - npm install
      - npm run build
      - echo "Building Docker image..."
      - docker build -t myapp-website .
      - docker tag myapp-website:latest 362857715742.dkr.ecr.eu-west-2.amazonaws.com/myapp-website:latest
      - echo "Pushing to ECR..."
      - docker push 362857715742.dkr.ecr.eu-west-2.amazonaws.com/myapp-website:latest
      - cd ..
      - |
        if [ "$ACTION" = "apply" ]; then
          terraform apply -auto-approve
        else
          terraform plan
        fi

  post_build:
    commands:
      - echo "Forcing ECS redeployment..."
      - aws ecs update-service --cluster myapp-cluster --service myapp-service --force-new-deployment --region eu-west-2
      - echo "Deployment complete!"

artifacts:
  files:
    - "**/*"
  discard-paths: no
